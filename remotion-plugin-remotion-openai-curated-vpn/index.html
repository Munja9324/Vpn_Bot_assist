<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>intrawb 10 GIF loader</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      .loader {
        width: min(860px, 94vw, 90vh);
        aspect-ratio: 1877 / 1221;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 28px 32px rgb(0 0 0 / 38%));
      }
    </style>
  </head>
  <body>
    <img class="loader" src="public/rf-crest-loader.gif" alt="Герб РФ" />
  </body>
</html>
